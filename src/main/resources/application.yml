server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: clienti-microservice

  # ── JPA / Hibernate ───────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        multiTenancy: SCHEMA
        tenant_identifier_resolver: com.poultryfarm.application.multitenancy.SchemaTenantResolver
        multi_tenant_connection_provider: com.poultryfarm.application.multitenancy.SchemaMultiTenantConnectionProvider
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
